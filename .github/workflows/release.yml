name: Release & Publish

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get commit message
        id: commit
        run: echo "message=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

      - name: Determine version bump
        id: bump
        run: |
          MSG="${{ steps.commit.outputs.message }}"
          if [[ "$MSG" == bc:* ]]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif [[ "$MSG" == feat:* ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif [[ "$MSG" == fix:* ]]; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: steps.bump.outputs.type != 'none'
        id: version
        run: |
          CURRENT=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

          sed -i "s/version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" commitai/__init__.py

      - name: Commit version bump
        if: steps.bump.outputs.type != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml commitai/__init__.py
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git push

      - name: Create tag and release
        if: steps.bump.outputs.type != 'none'
        run: |
          TAG="v${{ steps.version.outputs.new }}"
          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        if: steps.bump.outputs.type != 'none'
        with:
          python-version: '3.12'

      - name: Build package
        if: steps.bump.outputs.type != 'none'
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        if: steps.bump.outputs.type != 'none'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Test package install
        run: |
          pip install dist/*.whl
          commit-msg-ai --help
          python -c "from commit_msg_ai.main import main; print('Import OK')"
